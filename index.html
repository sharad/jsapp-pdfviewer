<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced PDF Selector</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

#topbar {
  padding: 10px;
  background: #eee;
}

#container {
  flex: 1;
  display: flex;
  overflow: hidden;
}

#thumbnails {
  width: 220px;
  overflow-y: auto;
  border-right: 1px solid #ccc;
  padding: 10px;
}

.thumbnail {
  margin-bottom: 10px;
  border: 3px solid transparent;
  cursor: pointer;
}

.thumbnail.selected {
  border: 3px solid red;
}

#viewer {
  flex: 1;
  overflow: auto;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  background: #f9f9f9;
}

button {
  padding: 6px 12px;
}
</style>
</head>
<body>

<div id="topbar">
  <input type="file" id="fileInput" accept="application/pdf">
  <button id="exportBtn" disabled>Export Selected</button>
</div>

<div id="container">
  <div id="thumbnails"></div>
  <div id="viewer"></div>
</div>

<script>

 let pdfDoc = null;
 let originalBytes = null;
 let selectedPages = new Set();
 let lastSelected = null;

 const fileInput = document.getElementById("fileInput");
 const thumbnailsDiv = document.getElementById("thumbnails");
 const viewerDiv = document.getElementById("viewer");
 const exportBtn = document.getElementById("exportBtn");

 fileInput.onchange = e => {
     if (e.target.files.length > 0) {
         loadPDF(e.target.files[0]);
     }
 };

 async function loadPDF(file) {
     const buffer = await file.arrayBuffer();

     const renderBuffer = buffer.slice(0);
     originalBytes = buffer.slice(0);

     const loadingTask = pdfjsLib.getDocument({ data: renderBuffer });
     pdfDoc = await loadingTask.promise;

     thumbnailsDiv.innerHTML = "";
     viewerDiv.innerHTML = "";
     selectedPages.clear();
     exportBtn.disabled = true;

     for (let i = 1; i <= pdfDoc.numPages; i++) {
         const page = await pdfDoc.getPage(i);
         const viewport = page.getViewport({ scale: 0.25 });

         const canvas = document.createElement("canvas");
         canvas.width = viewport.width;
         canvas.height = viewport.height;

         await page.render({
             canvasContext: canvas.getContext("2d"),
             viewport
         }).promise;

         const wrapper = document.createElement("div");
         wrapper.className = "thumbnail";
         wrapper.appendChild(canvas);

         wrapper.onclick = (event) => {
             handleSelection(i - 1, wrapper, event);
             showPage(i);
         };

         thumbnailsDiv.appendChild(wrapper);
     }
 }

 function handleSelection(index, element, event) {

     if (event.ctrlKey) {
         // Multi select
         if (selectedPages.has(index)) {
             selectedPages.delete(index);
             element.classList.remove("selected");
         } else {
             selectedPages.add(index);
             element.classList.add("selected");
         }
     } else {
         // Single select
         selectedPages.clear();
         document.querySelectorAll(".thumbnail")
                 .forEach(t => t.classList.remove("selected"));

         selectedPages.add(index);
         element.classList.add("selected");
     }

     lastSelected = index;
     exportBtn.disabled = selectedPages.size === 0;
 }

 async function showPage(pageNumber) {
     viewerDiv.innerHTML = "";

     const page = await pdfDoc.getPage(pageNumber);
     const viewport = page.getViewport({ scale: 1.2 });

     const canvas = document.createElement("canvas");
     canvas.width = viewport.width;
     canvas.height = viewport.height;

     await page.render({
         canvasContext: canvas.getContext("2d"),
         viewport
     }).promise;

     viewerDiv.appendChild(canvas);
 }

 exportBtn.onclick = async () => {

     const pdfDocLib = await PDFLib.PDFDocument.load(originalBytes);
     const newPdf = await PDFLib.PDFDocument.create();

     const sorted = Array.from(selectedPages).sort((a,b)=>a-b);

     const copied = await newPdf.copyPages(pdfDocLib, sorted);

     copied.forEach(p => newPdf.addPage(p));

     const newBytes = await newPdf.save();

     const blob = new Blob([newBytes], { type: "application/pdf" });
     const url = URL.createObjectURL(blob);

     const a = document.createElement("a");
     a.href = url;
     a.download = "selected_pages.pdf";
     a.click();

     URL.revokeObjectURL(url);
 };

</script>
</body>
</html>
