<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced PDF Selector</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
 body {
     margin: 0;
     font-family: sans-serif;
     height: 100vh;
     display: flex;
     flex-direction: column;
     background: #2b2b2b;
     color: #eee;
 }

 #topbar {
     padding: 10px;
     background: #3a3a3a;
     display: flex;
     gap: 10px;
     align-items: center;
 }

 #container {
     flex: 1;
     display: flex;
     overflow: hidden;
 }

 #thumbnails {
     width: 220px;
     overflow-y: auto;
     background: #1f1f1f;
     border-right: 1px solid #444;
     padding: 10px;
 }

 .thumbnail {
     margin-bottom: 12px;
     padding: 4px;
     background: #2a2a2a;
     border-radius: 6px;
     border: 2px solid #444;
     cursor: pointer;
     transition: 0.2s;
 }

 .thumbnail:hover {
     border-color: #888;
 }

 .thumbnail.selected {
     border: 2px solid #ff4d4d;
 }

 #viewer {
     flex: 1;
     overflow: auto;
     display: flex;
     justify-content: center;
     padding: 30px;
     background: #2b2b2b;
 }

 #viewer canvas {
     box-shadow: 0 0 20px rgba(0,0,0,0.6);
     background: white;
     border-radius: 4px;
 }

 button, input {
     background: #555;
     color: white;
     border: none;
     padding: 6px 12px;
     border-radius: 4px;
 }

 button:hover {
     background: #777;
 }
</style>

</head>
<body>

    <div>
        <input type="file" id="fileInput" accept="application/pdf">
        <button id="exportBtn" disabled>Export Selected</button>

        <span>Page:</span>
        <input type="number" id="pageNumber" min="1" style="width:70px">
        <button id="goBtn">Go</button>
    </div>

    <div id="container">
        <div id="thumbnails"></div>
        <div id="viewer"></div>
    </div>

    <script>

     let pdfDoc = null;
     let originalBytes = null;
     let selectedPages = new Set();
     let lastSelected = null;

     const fileInput = document.getElementById("fileInput");
     const thumbnailsDiv = document.getElementById("thumbnails");
     const viewerDiv = document.getElementById("viewer");
     const exportBtn = document.getElementById("exportBtn");

     fileInput.onchange = e => {
         if (e.target.files.length > 0) {
             loadPDF(e.target.files[0]);
         }
     };

     async function loadPDF(file) {
         const buffer = await file.arrayBuffer();

         const renderBuffer = buffer.slice(0);
         originalBytes = buffer.slice(0);

         const loadingTask = pdfjsLib.getDocument({ data: renderBuffer });
         pdfDoc = await loadingTask.promise;

         thumbnailsDiv.innerHTML = "";
         viewerDiv.innerHTML = "";
         selectedPages.clear();
         exportBtn.disabled = true;

         for (let i = 1; i <= pdfDoc.numPages; i++) {
             const page = await pdfDoc.getPage(i);
             const viewport = page.getViewport({ scale: 0.25 });

             const canvas = document.createElement("canvas");
             canvas.width = viewport.width;
             canvas.height = viewport.height;

             await page.render({
                 canvasContext: canvas.getContext("2d"),
                 viewport
             }).promise;

             const wrapper = document.createElement("div");
             wrapper.className = "thumbnail";
             wrapper.appendChild(canvas);

             wrapper.onclick = (event) => {
                 handleSelection(i - 1, wrapper, event);
                 showPage(i);
             };

             thumbnailsDiv.appendChild(wrapper);
         }
     }

     function handleSelection(index, element, event) {

         if (event.ctrlKey) {
             // Multi select
             if (selectedPages.has(index)) {
                 selectedPages.delete(index);
                 element.classList.remove("selected");
             } else {
                 selectedPages.add(index);
                 element.classList.add("selected");
             }
         } else {
             // Single select
             selectedPages.clear();
             document.querySelectorAll(".thumbnail")
                     .forEach(t => t.classList.remove("selected"));

             selectedPages.add(index);
             element.classList.add("selected");
         }

         lastSelected = index;
         exportBtn.disabled = selectedPages.size === 0;
     }

     async function showPage(pageNumber) {
         viewerDiv.innerHTML = "";

         const page = await pdfDoc.getPage(pageNumber);
         const viewport = page.getViewport({ scale: 1.2 });

         const canvas = document.createElement("canvas");
         canvas.width = viewport.width;
         canvas.height = viewport.height;

         await page.render({
             canvasContext: canvas.getContext("2d"),
             viewport
         }).promise;

         viewerDiv.appendChild(canvas);
     }

     exportBtn.onclick = async () => {

         const pdfDocLib = await PDFLib.PDFDocument.load(originalBytes);
         const newPdf = await PDFLib.PDFDocument.create();

         const sorted = Array.from(selectedPages).sort((a,b)=>a-b);

         const copied = await newPdf.copyPages(pdfDocLib, sorted);

         copied.forEach(p => newPdf.addPage(p));

         const newBytes = await newPdf.save();

         const blob = new Blob([newBytes], { type: "application/pdf" });
         const url = URL.createObjectURL(blob);

         const a = document.createElement("a");
         a.href = url;
         a.download = "selected_pages.pdf";
         a.click();

         URL.revokeObjectURL(url);
     };



     // =====
     const pageInput = document.getElementById("pageNumber");
     const goBtn = document.getElementById("goBtn");

     goBtn.onclick = jumpToPage;
     pageInput.onkeydown = (e) => {
         if (e.key === "Enter") jumpToPage();
     };

     async function jumpToPage() {
         const pageNum = parseInt(pageInput.value);

         if (!pdfDoc || pageNum < 1 || pageNum > pdfDoc.numPages) {
             alert("Invalid page number");
             return;
         }

         showPage(pageNum);

         const thumbnails = document.querySelectorAll(".thumbnail");
         const target = thumbnails[pageNum - 1];

         if (target) {
             target.scrollIntoView({ behavior: "smooth", block: "center" });
         }
     }

    </script>
</body>
</html>
